name: Build & Deploy Guides

on:
  push:
    branches: [main]
    paths:
      - "docs/**"          # trigger when any doc changes
      - "mkdocs.yml"       # or when config changes
      - "requirements.txt" # or when dependencies change
  workflow_dispatch:       # allow manual trigger from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # opt into Node.js 24 ahead of June 2026 deadline

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
